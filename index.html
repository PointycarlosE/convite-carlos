<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Convite - 18 anos</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- FUNDO (stickers vão aqui depois) -->
    <div class="background">
        <div class="stickers"></div>
    </div>

    <!-- CARD DO CONVITE -->
    <div class="card" id="card">

        <!--Confeteee-->
        <div class="confetti-container"></div>

        <!-- ENVELOPE -->
        <div class="envelope">

            <div class="flap"></div>
            <div class="hint">Clica aqui</div>

            <div class="envelope-body"></div>

            <!-- CONTEÚDO (carta) -->
            <div class="card-content">
                <div class="inner-border">

                    <h1 class="title">Carlos</h1>
                    <h2 class="subtitle">18 anos</h2>

                    <p class="phrase">
                        UMA NOVA FASE COMEÇA, COM<br>
                        BRILHO, MÚSICA E BOAS HISTÓRIAS<br>
                        PRA CONTAR.
                    </p>

                    <p class="date">20 NOV — 20H</p>

                    <p class="location">
                        RUA TAL, 123<br>
                        SUA CIDADE
                    </p>

                </div>
            </div>

        </div>

    </div>

    <script src="script.js"></script>
</body>

</html>
